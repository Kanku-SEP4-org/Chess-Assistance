services:
  postgres:
    image: postgres:latest
    environment:
      POSTGRES_DB: chess_test
      POSTGRES_USER: chess
      POSTGRES_PASSWORD: chess
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./triggers.sql:/docker-entrypoint-initdb.d/02_triggers.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chess -d chess_test"]
      interval: 2s
      timeout: 3s
      retries: 10

  test:
    image: postgres:latest
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./test_triggers.sql:/test_triggers.sql:ro
    entrypoint: >
      psql
        -h postgres
        -U chess
        -d chess_test
        -f /test_triggers.sql
    environment:
      PGPASSWORD: chess
