services:
  postgres:
    image: postgres:17
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/databases/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./scripts/databases/triggers.sql:/docker-entrypoint-initdb.d/02_triggers.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chess}"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:latest
    hostname: chess_rabbitmq
    container_name: chess_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  prediction-service-grpc:
    build:
      context: .
      dockerfile: services/ModelServices/PredictionService.grpc/Dockerfile
    ports:
      - "5283:5283"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5283
      - FastApi__BaseUrl=http://fastapi-service:8000/
    depends_on:
      - fastapi-service

  fastapi-service:
    build:
      context: .
      dockerfile: machine_learning/api/.dockerfile
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=/app/models/model.pkl
      - SCALER_PATH=/app/models/scaler.pkl
      - ANGRINESS_MODEL_PATH=/app/angriness_models/model.pkl
      - ANGRINESS_SCALER_PATH=/app/angriness_models/scaler.pkl
      - ANGRINESS_BINS_PATH=/app/angriness_models/angriness_bins.json
      - DATABASE_URL=postgresql://${POSTGRES_USER:-chess}:${POSTGRES_PASSWORD:-chess1234}@postgres:5432/${POSTGRES_DB:-chess_postgres}
    depends_on:
      postgres:
        condition: service_healthy

  lichess-api:
    build:
      context: .
      dockerfile: services/LichessApiService.grpc/Dockerfile
    ports:
      - "8082:8082"
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8082
      - CONNECTIONSTRINGS__DEFAULTCONNECTION=${CONNECTIONSTRINGS__DEFAULTCONNECTION}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  rabbitmq_data:
