services:
  postgres:
    image: postgres:17
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/databases/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./scripts/databases/triggers.sql:/docker-entrypoint-initdb.d/02_triggers.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chess} -d ${POSTGRES_DB:-chess_postgres}"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:latest
    hostname: chess_rabbitmq
    container_name: chess_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  fastapi-service:
    build:
      context: .
      dockerfile: machine_learning/api/.dockerfile
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=/app/models/model.pkl
      - SCALER_PATH=/app/models/scaler.pkl
      - ANGRINESS_MODEL_PATH=/app/angriness_models/model.pkl
      - ANGRINESS_SCALER_PATH=/app/angriness_models/scaler.pkl
      - ANGRINESS_BINS_PATH=/app/angriness_models/angriness_bins.json
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy

  lichess-api:
    build:
      context: .
      dockerfile: services/LichessApiService.grpc/Dockerfile
    ports:
      - "8082:8082"
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8082
      - CONNECTIONSTRINGS__DEFAULTCONNECTION=${CONNECTIONSTRINGS__DEFAULTCONNECTION}
    depends_on:
      postgres:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - IOT_GRPC_HOST=iot-service
      - IOT_GRPC_PORT=8080
      - LICHESS_GRPC_HOST=lichess-api
      - LICHESS_GRPC_PORT=8082
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
    env_file:
      - .env
    depends_on:
      - lichess-api

volumes:
  pgdata:
  rabbitmq_data:
