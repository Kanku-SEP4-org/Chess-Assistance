syntax = "proto3";

//imports here
//options here
package iotService;

enum sensorType {
    temp = 0;
    light = 1;
    water = 2;
    co2 = 3;
    error = 4; 
}
service iotService {
    rpc getTemperature(tempReq) returns (tempRes);
    rpc getLight(lightReq) returns (lightRes);
    rpc getWaterLevel(waterLevelReq) returns (waterLevelRes);
    rpc getCO2(co2Req) returns (co2Res);
}

message tempReq {
    int32 arduinoId = 1;
}

message tempRes {
    sensorReading reading =1;
    Status status = 2;
}

message lightReq {
    int32 arduinoId = 1;
}

message lightRes {
    sensorReading reading =1;
    Status status = 2;
}

message waterLevelReq {
    int32 arduinoId = 1;
}
message waterLevelRes {
    sensorReading reading =1;
    Status status = 2;
}

message co2Req {
    int32 arduinoId = 1;
}

message co2Res {
    sensorReading reading = 1;
    Status status = 2;
}

message Status {
    bool success = 1;
    string message = 2;
}

message sensorReading {
    float value = 1;
    sensorType type = 2; //to identify the kind of sensor. possibly use an enum
    int64 timestamp = 3;
}




