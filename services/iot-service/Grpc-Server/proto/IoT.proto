syntax = "proto3";

//imports here
//options here
package iotService;

enum sensorType {
    error = 0;
    temp = 1;
    light = 2;
    water = 3;
    fillCup = 4;
    co2 = 5;
}
service iotService {
    rpc getTemperature(tempReq) returns (tempRes);
    rpc getLight(lightReq) returns (lightRes);
    rpc getWaterLevel(waterLevelReq) returns (waterLevelRes);
    rpc fillCup(fillCupReq) returns (fillCupRes);
    rpc getCO2(co2Req) returns (co2Res);
}

message tempReq {
    int32 arduinoId = 1;
}

message tempRes {
    sensorReading reading =1;
    Status status = 2;
}

message lightReq {
    int32 arduinoId = 1;
}

message lightRes {
    sensorReading reading =1;
    Status status = 2;
}

message waterLevelReq {
    int32 arduinoId = 1;
}
message waterLevelRes {
    sensorReading reading =1;
    Status status = 2;
}

message fillCupReq {
    int32 arduinoId = 1;
    optional float amount = 2; //amount of water to fill in milliliters, optional because we can also just request a standard quantity fill, set up previously
}
message fillCupRes {
    Status status = 1;
}

message co2Req {
    int32 arduinoId = 1;
}

message co2Res {
    sensorReading reading = 1;
    Status status = 2;
}

message Status {
    bool success = 1;
    string message = 2;
}

message sensorReading {
    float value = 1;
    sensorType type = 2; //to identify the kind of sensor. use the enum
    int64 timestamp = 3;
}




