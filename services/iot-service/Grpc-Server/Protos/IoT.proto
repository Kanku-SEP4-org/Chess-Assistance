syntax = "proto3";

//imports here
//options here
package iotService;

enum sensorType {
    temp = 0;
}
service iotService {
    rpc getTemperature(tempReq) returns (tempRes);
}

message tempReq {
    int32 arduinoId = 1;
}

message tempRes {
    sensorReading reading =1;
    Status status = 2;
}

message Status {
    bool success = 1;
    string message = 2;
}

message sensorReading {
    float value = 1;
    sensorType type = 2; //to identify the kind of sensor. possibly use an enum
    int64 timestamp = 3;
}




