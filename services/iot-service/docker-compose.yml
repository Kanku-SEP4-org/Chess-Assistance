
services:
  grpc-server:
    build:
      context: .
      dockerfile: Grpc-Server/Dockerfile
    ports:
      - "8080:8080"
    environment:
      RabbitMQ__Host: rabbitmq
      RabbitMQ__User: guest
      RabbitMQ__Password: guest
      RabbitMQ__RequestQueue: sensor.requests
      RabbitMQ__ResponseQueue: sensor.responses
    depends_on:
      rabbitmq:
        condition: service_healthy
# docker compose down --volumes --remove-orphans
# docker builder prune -f
# docker compose build --no-cache
# docker compose up -d --force-recreate
# docker compose logs grpc-server --tail=100

  rabbitmq:
    image: rabbitmq:4-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
  mock-producer:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    container_name: mock-producer
    volumes:
      - ./:/src:rw
    working_dir: /src/Mock_IoT_Producer
    depends_on:
      - rabbitmq
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    tty: true
    stdin_open: true
    command: /bin/bash