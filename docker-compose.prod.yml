# Production deployment for VPS
# Note: Run from repo root: docker compose -f docker-compose.prod.yml up --build -d

services:

  postgres:
    image: postgres:17
    container_name: chess-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/databases/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./scripts/databases/triggers.sql:/docker-entrypoint-initdb.d/02_triggers.sql:ro
    networks:
      - chess_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: chess-api-gateway
    environment:
      - GRPC_HOST=chess-grpc-service
    networks:
      - caddy_net
      - chess_internal
    depends_on:
      - grpc-service
    restart: unless-stopped

  ml-api:
    build:
      context: .
      dockerfile: machine_learning/api/.dockerfile
    container_name: chess-ml-api
    environment:
      - MODEL_PATH=/app/models/model.pkl
      - SCALER_PATH=/app/models/scaler.pkl
    networks:
      - chess_internal
    restart: unless-stopped

  iot-service:
    build:
      context: ./services/iot-service
      dockerfile: Grpc-Server/Dockerfile
    container_name: chess-iot-service
    networks:
      - chess_internal
    restart: unless-stopped

  lichess-api:
    build:
      context: .
      dockerfile: services/LichessApiService.grpc/Dockerfile
    container_name: chess-lichess-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8082
      - CONNECTIONSTRINGS__DEFAULTCONNECTION=${CONNECTIONSTRINGS__DEFAULTCONNECTION}
      - IOT__GRPCHOST=chess-iot-service
      - IOT__GRPCPORT=8080
    networks:
      - chess_internal
    depends_on:
      iot-service:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:

networks:
  caddy_net:
    external: true
    name: caddy_net
  chess_internal:
    driver: bridge
