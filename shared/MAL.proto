syntax = "proto3";

package machine_learning;

message PhysicalCondition {
    int32 minutes_slept = 1;
    int32 minutes_awake = 2;
}

message Empty
{

}

message Sensor {
    string sensor_id = 1; 
}

message SensorReading {
    int32 value = 1;
    int32 type = 2;
    int32 time = 3;
    Sensor sensor = 4; 
}

message Room {
    string room_id = 1;
    repeated SensorReading sensor_reading = 2;
}

message WinratePredictionInput {
    PhysicalCondition physical_condition = 1;
    Room room = 2;
}

message Dashboard {
    int32 prediction_winrate = 1;
    bool is_active = 2;
    string message = 3;
}

//the thing ain't work, I'll just follows what FastAPI's method had for now

message WinratePredictionRequest
{
    float minutes_slept = 1;
    float minutes_awake = 2;
    float temperature_celsius = 3;
    float co2 = 4;
    float light = 5;
}

message WinratePredictionResponse
{
    float prediction = 1;
}

service WinrateService
{
    rpc Predict(WinratePredictionRequest) returns (WinratePredictionResponse);
    rpc PredictMock(WinratePredictionRequest) returns (WinratePredictionResponse);
}
