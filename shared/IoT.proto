syntax = "proto3";

//imports here
//options here
package iotService;

enum sensorType {
    temp = 0;
    light = 1;
    water = 2;
    error = 3; 
}
service iotService {
    rpc getTemperature(tempReq) returns (tempRes);
    rpc getLight(lightReq) returns (lightRes);
    rpc getWaterLevel(waterLevelReq) returns (waterLevelRes);
    rpc startRecording(recReq) returns (Status);
    rpc stopRecording(recReq) returns (Status);
}

message tempReq {
    int32 arduinoId = 1;
}

message tempRes {
    sensorReading reading =1;
    Status status = 2;
}

message lightReq {
    int32 arduinoId = 1;
}

message lightRes {
    sensorReading reading =1;
    Status status = 2;
}

message waterLevelReq {
    int32 arduinoId = 1;
}
message waterLevelRes {
    sensorReading reading =1;
    Status status = 2;
}

message Status {
    bool success = 1;
    string message = 2;
}

message sensorReading {
    float value = 1;
    sensorType type = 2; //to identify the kind of sensor. possibly use an enum
    int64 timestamp = 3;
}
