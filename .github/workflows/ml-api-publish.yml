name: ML API (Docker Publish)

on:
  push:
    branches: [develop, main]
    paths:
      - "machine_learning/**"
      - ".github/workflows/ml-api-publish.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install trainer dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r machine_learning/trainers/trainer-winrate/requirements.txt

      - name: Run training pipeline (generate model artifacts)
        working-directory: machine_learning/trainers/trainer-winrate
        run: python run_pipeline.py

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata (develop)
        if: github.ref_name == 'develop'
        id: meta_develop
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/ml-api
          tags: |
            type=raw,value=dev
            type=sha,prefix=sha-

      - name: Extract image metadata (main)
        if: github.ref_name == 'main'
        id: meta_main
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/ml-api
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push Docker image (develop)
        if: github.ref_name == 'develop'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: machine_learning/api/.dockerfile
          push: true
          tags: ${{ steps.meta_develop.outputs.tags }}
          labels: ${{ steps.meta_develop.outputs.labels }}

      - name: Build and push Docker image (main)
        if: github.ref_name == 'main'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: machine_learning/api/.dockerfile
          push: true
          tags: ${{ steps.meta_main.outputs.tags }}
          labels: ${{ steps.meta_main.outputs.labels }}

