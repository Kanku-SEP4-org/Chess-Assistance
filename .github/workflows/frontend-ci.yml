name: Frontend CI

on:
  pull_request:
    branches: [develop]
    paths:
      - 'frontend/chessapp/**'

jobs:
  ci:
    name: Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/chessapp

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/chessapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --watchAll=false

      - name: Build
        run: npm run build
