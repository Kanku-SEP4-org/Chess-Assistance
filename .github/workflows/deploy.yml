name: Deploy Chess-Assistance to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check deploy configuration
        id: check
        shell: bash
        env:
          VPS_IP: ${{ secrets.VPS_IP }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          missing=0

          if [ -z "${VPS_IP:-}" ]; then
            echo "Missing required secret: VPS_IP"
            missing=1
          fi
          if [ -z "${SSH_PRIVATE_KEY:-}" ]; then
            echo "Missing required secret: SSH_PRIVATE_KEY"
            missing=1
          fi
          if [ -z "${DEPLOY_PATH:-}" ]; then
            echo "Missing required secret: DEPLOY_PATH"
            missing=1
          fi

          if [ "$missing" -eq 1 ]; then
            echo "Deployment will be skipped (missing secrets)."
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          else
            echo "Deployment enabled."
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Copy Caddy config to VPS via SCP(stand for "Secure Copy Protocol")
        if: steps.check.outputs.should_deploy == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "infrastructure/Caddyfile.chess"
          target: "/opt/caddy/sites/chess-assistance"
          strip_components: 1

      - name: Deploy via Docker Compose (SSH)
        if: steps.check.outputs.should_deploy == 'true'
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          COMPOSE_FILE: ${{ secrets.COMPOSE_FILE }}
        with:
          host: ${{ secrets.VPS_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DEPLOY_PATH,COMPOSE_FILE
          script: |
            set -euo pipefail
            COMPOSE_FILE="${COMPOSE_FILE:-docker-compose.prod.yml}"
            echo "Deploying with docker compose file: ${COMPOSE_FILE}"
            cd "${DEPLOY_PATH}"
            docker compose -f "${COMPOSE_FILE}" pull
            docker compose -f "${COMPOSE_FILE}" up -d
