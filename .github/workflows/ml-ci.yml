name: ML Pipeline CI

on:
  push:
    branches: [develop, main]
    paths:
      - "machine_learning/**"
  pull_request:
    branches: [develop, main]
    paths:
      - "machine_learning/**"

jobs:
  ml-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: machine_learning

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r trainer/requirements.txt
          pip install fastapi

      - name: Run training pipeline
        working-directory: machine_learning/trainer
        run: python run_pipeline.py

      - name: Verify pipeline artifacts
        working-directory: machine_learning/trainer
        run: |
          echo "Checking pipeline artifacts..."
          test -f models/scaler.pkl        || { echo "FAIL: models/scaler.pkl not found";        exit 1; }
          test -f models/model.pkl         || { echo "FAIL: models/model.pkl not found";         exit 1; }
          test -f models/metrics.json      || { echo "FAIL: models/metrics.json not found";      exit 1; }
          test -f models/eval_metrics.json || { echo "FAIL: models/eval_metrics.json not found"; exit 1; }
          echo "All artifacts present."
          echo "--- metrics.json ---"
          cat models/metrics.json
          echo ""
          echo "--- eval_metrics.json ---"
          cat models/eval_metrics.json

      - name: FastAPI health check
        working-directory: machine_learning/api
        env:
          MODEL_PATH: ${{ github.workspace }}/machine_learning/trainer/models/model.pkl
          SCALER_PATH: ${{ github.workspace }}/machine_learning/trainer/models/scaler.pkl
        run: |
          uvicorn main:app --host 127.0.0.1 --port 8000 &
          SERVER_PID=$!

          for i in 1 2 3 4 5; do
            if curl -sf http://127.0.0.1:8000/health; then
              echo ""
              echo "Health check passed."
              kill $SERVER_PID
              exit 0
            fi
            echo "Attempt $i: server not ready, waiting 2s..."
            sleep 2
          done

          echo "FAIL: FastAPI server did not respond to /health within 10 seconds."
          kill $SERVER_PID 2>/dev/null || true
          exit 1
