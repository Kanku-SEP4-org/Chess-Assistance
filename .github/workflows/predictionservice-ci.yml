name: PredictionService (.NET) CI

on:
  pull_request:
    branches: [develop, main]
    paths:
      - "services/ModelServices/PredictionService.grpc/**"
      - "services/ModelServices/PredictionService.grpc.Tests/**"
      - "shared/MAL.proto"
      - ".github/workflows/predictionservice-ci.yml"
  push:
    branches: [develop, main]
    paths:
      - "services/ModelServices/PredictionService.grpc/**"
      - "services/ModelServices/PredictionService.grpc.Tests/**"
      - "shared/MAL.proto"
      - ".github/workflows/predictionservice-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore services/ModelServices/ModelServices.slnx

      - name: Test
        run: dotnet test services/ModelServices/ModelServices.slnx --configuration Release --no-restore

