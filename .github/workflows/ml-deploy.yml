name: Machine Learning Team Server Deployment

on:
  push:
    branches: [main]

    # ---------------------------------------------------------
    # Final: Deploy to VPS (pull pre-built images)
    # ---------------------------------------------------------
jobs:
    deploy-ml-services:
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        runs-on: ubuntu-latest
        timeout-minutes: 20

        steps:
          - name: Checkout repository
            uses: actions/checkout@v4

          - name: Copy deployment files to VPS
            uses: appleboy/scp-action@v0.1.7
            with:
                host: ${{ secrets.VPS_HOST }}
                username: ${{ secrets.VPS_USERNAME }}
                key: ${{ secrets.SSH_PRIVATE_KEY }}
                source: |
                    docker-compose.prod.yml
                    docker-compose.yml
                    .env.prod
                    scripts/databases/init.sql
                    scripts/databases/triggers.sql
                    scripts/ml/*
                target: "/opt/chess-assistance"
        
          - name: Copy Caddyfile to Caddy config directory
            uses: appleboy/scp-action@v0.1.7
            with:
                host:     ${{ secrets.SERVER_IP }}
                username: root
                key:      ${{ secrets.SSH_PRIVATE_KEY }}
                source:   "infrastructure/chess.Caddyfile"
                target:   "/opt/caddy/sites"
                # Without strip_components:
                # infrastructure/respawn.Caddyfile → /opt/caddy/sites/infrastructure/chess.Caddyfile
                # With strip_components: 1:
                # infrastructure/respawn.Caddyfile → /opt/caddy/sites/chess.Caddyfile
                strip_components: 1