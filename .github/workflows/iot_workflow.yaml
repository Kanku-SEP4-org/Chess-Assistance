
name: IoT Workflow

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ "**" ]
    paths:
      - "services/iot-service/Grpc-Server/**"
      - "services/iot-service/Grpc_Test/**"
      - "internet_of_things/sensor_client_c/**"
      - "internet_of_things/Sensors/**"

jobs:
  build-test-c:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
      with:
        submodules: recursive  # Ensures Unity/libs are pulled if they are submodules
        fetch-depth: 0         # Pulls all history (better for some build tools)

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake librabbitmq-dev rabbitmq-server python3-pip

    - name: Start RabbitMQ Service
      run: sudo service rabbitmq-server start

    # --- C CLIENT BUILD & TEST ---
    - name: Build Sensor Client C
      run: |
        cd internet_of_things/sensor_client_c
        mkdir -p build
        cd build
        cmake ..
        make

    - name: Run C Unit Tests
      run: |
        cd internet_of_things/sensor_client_c/build
        ./test_message_builder
        ./test_sensor_reader

    # --- ARDUINO/PLATFORMIO BUILD ---
    - name: Install PlatformIO
      run: |
        python3 -m pip install --upgrade pip
        pip install platformio

    - name: Build Sensors (Arduino)
      run: |
        cd internet_of_things/Sensors
        pio run

  build-test-grpc:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
      with:
        submodules: recursive  # Ensures Unity/libs are pulled if they are submodules
        fetch-depth: 0         # Pulls all history (better for some build tools)

    # --- SETUP SECTION ---
    - name: Set up .NET SDK
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake librabbitmq-dev rabbitmq-server python3-pip

    - name: Start RabbitMQ Service
      run: sudo service rabbitmq-server start

    # --- C# BUILD & TEST ---
    - name: Build and Test gRPC Server
      run: |
        dotnet build services/iot-service/Grpc-Server/Grpc-Server.csproj
        dotnet test services/iot-service/Grpc_Test/Grpc_Test.csproj
      